[pytest]
# A suíte da ferramenta (harness) vive em tests/. Os arquivos em
# generated_tests/ são o PRODUTO do LLM e só executam nos diretórios isolados
# montados por run_tests.py/mutation_run.py (onde existe solution.py); não devem
# ser coletados pela execução de pytest na raiz.
testpaths = tests
